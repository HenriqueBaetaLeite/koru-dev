<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="panda.png" type="image/png">
    
    <meta property="og:title" content="Meu panda site!">
    <meta property="og:description" content="Tutorial para iniciantes em HTML.">
    <meta property="og:image" content="https://i.postimg.cc/j2VxKd0t/panda.png">
    <meta property="og:url" content="https://i.postimg.cc/j2VxKd0t/panda.png">
    <meta property="og:type" content="website">
    
    <title>HTML - Desenvolve Koru</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Aula HTML forms e table</h1>

    <form action="/">

      <div>
        <label for="nome">Nome Completo:</label>        
        <input required type="text" name="nome-completo" id="nome" placeholder="Digite aqui">
      </div>

      <div>
        <label for="password">Password:</label>
        <input type="password" name="password" id="password">
      </div>

      <div>
        <label for="email">Email:</label>
        <input type="email" name="email" id="email">
      </div>

      <div>
        <label for="description">Descrição:</label>
        <textarea name="description" id="description"></textarea>
      </div>

      <fieldset>
        <legend>Escolha a versão:</legend>
        
        <input type="radio" id="luxo" name="versao" value="luxo">
        <label for="luxo">Luxo</label>

        <input type="radio" id="standard" name="versao"
        value="standard">
        <label for="standard">Standard</label>
      </fieldset>

      <fieldset>
        <legend>Opcionais</legend>

        <input type="checkbox" id="ar" name="opcional"
          value="ar-condicionado" checked>
        <label for="ar">Ar condicionado</label>

        <input type="checkbox" name="opcional" id="automatico"
        value="automatico">
        <label for="automatico">Automático</label>

        <input type="checkbox" name="opcional" id="quatro-portas"
          value="quatro-portas">
          <label for="quatro-portas">4 Portas</label>
      </fieldset>

      <fieldset>
        <legend>Escolha uma cor:</legend>

        <label for="cor">Cores:</label>
        <select name="cor" id="cor">
          <option value=""></option>
          <option value="vermelha">Vermelha</option>
          <option value="prata">Prata</option>
          <option value="amarela">Amarela</option>
        </select>
      </fieldset>

    
      <fieldset>
        <legend>Arquivo</legend>

        <label for="imagem">Carregue sua imagem</label>
        <input type="file" id="imagem" name="imagem" accept=".doc">

      </fieldset>

      <input type="color" name="cores" value="#e66465">

      <button type="submit">Enviar</button>
    </form>


    <table>
      <thead>
        <tr>
          <th>Cor</th>
          <th>Opcional</th>
          <th>Versão</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Vermelha</td>
          <td>Ar-condicionado</td>
          <td>Luxo</td>
        </tr>
        <tr>
          <td>Amarela</td>
          <td>Automático, Ar-condicionado</td>
          <td>Standard</td>
        </tr>
        <tr>
          <td colspan="2">Total</td>
          <td>80k</td>
        </tr>
      </tbody>
    </table>

  </body>
</html>
