<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contador</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Meu Contador JS vanilla</h1>
  <p id="counter">0</p>
  
  <!-- botão de reset, botão de +1 e -1 -->
  <div>
    <button id="decrease-10-button">-10</button>
    <button id="decrease-button">-1</button>
    <button id="reset-button">Reset</button>
    <button id="increase-button">+1</button>
    <button id="increase-10-button">+10</button>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
